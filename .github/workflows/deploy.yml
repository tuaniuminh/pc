name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Supabase Credentials
        run: |
          sed -i "s|'https://rwmhivfwjusezxedjtgw.supabase.co'|'${{ secrets.SUPABASE_URL }}'|g" app.js
          sed -i "s|'sb_publishable_sOm6SWd3dIIerce97LHXNw_OVCroPTr'|'${{ secrets.SUPABASE_ANON_KEY }}'|g" app.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
