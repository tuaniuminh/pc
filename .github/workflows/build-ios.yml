name: Build Native iOS App (TrollStore IPA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build & Package TrollStore IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Build Native SwiftUI Binary with Swift Package Manager
        run: |
          cd ios
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          swift build -c release --sdk "$SDK_PATH" -Xswiftc -target -Xswiftc arm64-apple-ios15.0

      - name: Package App Bundle & Sign Ad-Hoc for TrollStore
        run: |
          mkdir -p Payload/PCFlex.app
          
          # Dynamically locate compiled binary
          BINARY_PATH=$(find ios/.build -name PCFlex -type f -perm +111 | head -n 1)
          if [ -z "$BINARY_PATH" ]; then
            BINARY_PATH=$(find ios/.build -name PCFlex -type f | head -n 1)
          fi
          echo "Found compiled binary at: $BINARY_PATH"
          
          # Copy compiled executable & Info.plist into app bundle
          cp "$BINARY_PATH" Payload/PCFlex.app/PCFlex
          chmod +x Payload/PCFlex.app/PCFlex
          cp ios/PCFlex/Info.plist Payload/PCFlex.app/Info.plist
          
          # Ad-Hoc Code Signing with TrollStore Entitlements
          codesign --force --sign - --deep --entitlements ios/ios-build-entitlements.plist Payload/PCFlex.app
          
          # Compress Payload to PCFlex.ipa
          zip -r PCFlex.ipa Payload

      - name: Upload TrollStore IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCFlex-TrollStore-IPA
          path: PCFlex.ipa
