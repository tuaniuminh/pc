name: Build Native iOS App (TrollStore IPA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build & Package TrollStore IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Build Native SwiftUI App (.app)
        run: |
          xcodebuild -project ios/PCFlex.xcodeproj \
                     -scheme PCFlex \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO \
                     clean build

      - name: Prepare Payload, App Icons & Manual Ad-Hoc Codesign
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/PCFlex.app Payload/
          
          # Copy App Icons into Bundle for SpringBoard
          cp logo.png Payload/PCFlex.app/logo.png
          cp logo.png Payload/PCFlex.app/logo
          cp logo.png Payload/PCFlex.app/AppIcon.png
          cp logo.png Payload/PCFlex.app/AppIcon60x60@2x.png
          cp logo.png Payload/PCFlex.app/AppIcon60x60@3x.png
          
          # Force Ad-Hoc Sign with get-task-allow = false Entitlements
          codesign --force --sign - --deep --entitlements ios/ios-build-entitlements.plist Payload/PCFlex.app
          
          # Compress Payload to PCFlex_v1.2.02.ipa
          zip -r PCFlex_v1.2.02.ipa Payload

      - name: Upload TrollStore IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PCFlex_v1.2.02
          path: PCFlex_v1.2.02.ipa
